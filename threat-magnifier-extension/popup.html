<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            width: 280px;
            padding: 15px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: left;
            background: #fdfdfd;
        }

        h3 {
            margin-top: 0;
            color: #333;
            text-align: center;
        }

        p.desc {
            font-size: 13px;
            color: #666;
            margin-bottom: 20px;
            text-align: center;
        }

        button {
            padding: 12px 20px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            background: #2196F3;
            color: white;
            border: none;
            border-radius: 6px;
            transition: background 0.2s;
            width: 100%;
            margin-bottom: 20px;
        }

        button:hover {
            background: #1976D2;
        }

        button.active {
            background: #f44336;
        }

        button.active:hover {
            background: #d32f2f;
        }

        .option-group {
            margin-bottom: 15px;
            background: #f5f5f5;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #eee;
        }

        .api-key-group {
            margin-bottom: 15px;
            background: #fff3e0;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ffcc80;
        }

        .api-input {
            width: 100%;
            padding: 8px;
            margin-top: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 13px;
        }

        .option-label {
            display: flex;
            align-items: center;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            color: #444;
        }

        .option-label input {
            margin-right: 10px;
            width: 16px;
            height: 16px;
        }

        .option-desc {
            font-size: 12px;
            color: #777;
            margin-top: 4px;
            margin-left: 26px;
        }
    </style>
</head>

<body>
    <h3>Threat Magnifier</h3>
    <p class="desc">What a Sigma Tool!</p>

    <button id="toggleBtn">Start Magnifier</button>

    <div class="option-group">
        <label class="option-label">
            <input type="checkbox" id="advancedToggle"> Advanced Option
        </label>
        <div class="option-desc">Shows detailed threat analysis and website previews. If disabled, only a color flag is
            shown.</div>
    </div>

    <div class="option-group">
        <label class="option-label">
            <input type="checkbox" id="blockDangerToggle" checked> Block Dangerous Links
        </label>
        <div class="option-desc">Prevents clicking links classified as dangerous. A warning will appear with an option
            to proceed anyway.</div>
    </div>

    <div class="api-key-group">
        <label class="option-label" for="vtApiKey">VirusTotal API Key (Optional)</label>
        <div class="option-desc" style="margin-left: 0;">Used to score external links in Advanced Mode.</div>
        <input type="password" id="vtApiKey" class="api-input" placeholder="Enter API Key here...">
        <button id="saveApiBtn" style="margin-top: 10px; margin-bottom: 0; padding: 8px; background: #FF9800;">Save
            Key</button>
    </div>

    <script src="popup.js"></script>
</body>

</html>
